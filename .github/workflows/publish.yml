name: Publish book

on:
  push:
    branches: [main]
  # Rebuild on a schedule so edits pushed to the cases repo
  # (crimes-against-causality/cases) appear on the site automatically, without
  # any cross-repo token. Runs every 30 minutes; GitHub may delay scheduled
  # runs under load. Widen the interval to reduce Actions noise.
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs of this workflow.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site backbone
        uses: actions/checkout@v4

      - name: Fetch case content
        run: git clone --depth 1 https://github.com/crimes-against-causality/cases.git cases

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        run: Rscript -e 'install.packages(c("yaml", "stringr"))'

      - name: Generate chapters from cases/
        run: Rscript scripts/build-book.R

      - name: Render book
        run: quarto render book

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/_book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
